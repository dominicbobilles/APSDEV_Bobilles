<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<style>
/* =========================
   GLOBAL RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", system-ui, sans-serif;
}

/* =========================
   BACKGROUND
========================= */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #d7d7d7, #f5f5f5);

    animation: fadeIn 0.8s ease;
}

/* fade-in animation */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
}

/* =========================
   CALCULATOR CONTAINER
========================= */
.calculator {
    width: 400px;
    padding: 22px;
    border-radius: 24px;

    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* TITLE */
.title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

/* =========================
   HISTORY DISPLAY
========================= */
.history {
    text-align: right;
    font-size: 13px;
    color: grey;
    min-height: 18px;
    overflow-x: auto;
    margin-bottom: 5px;
}

/* =========================
   NUMBER BOX (DISPLAY)
========================= */
.display {
    width: 100%;
    border: none;
    outline: none;

    padding: 12px;
    font-size: 26px;
    text-align: right;

    border-radius: 14px;

    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(0,0,0,0.1);

    transition: 0.2s ease;
}

/* auto shrink */
.display.long {
    font-size: 18px;
}

/* =========================
   BUTTON GRID
========================= */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 15px;
}

/* BUTTON STYLE */
button {
    padding: 16px;
    border: none;
    border-radius: 14px;

    font-size: 16px;
    cursor: pointer;

    transition: 0.2s ease;

    background: #f2f2f2;
    color: black;

    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* hover effect */
button:hover {
    transform: translateY(-2px);
    background: #e9e9e9;
}

/* click effect */
button:active {
    transform: scale(0.94);
}

/* COLORS */
.operator {
    color: red;
    font-weight: bold;
}

.special {
    background: black;
    color: white;
}

.equal {
    background: red;
    color: white;
    font-weight: bold;
}

/* RESPONSIVE */
@media (max-width: 500px) {
    .calculator {
        width: 95%;
    }
}
</style>
</head>

<body>

<div class="calculator">

    <div class="title">CALCULATOR</div>

    <!-- HISTORY -->
    <div class="history" id="history"></div>

    <!-- DISPLAY BOX -->
    <input type="text" id="display" class="display" disabled />

    <!-- BUTTONS -->
    <div class="buttons">

        <button class="special" onclick="clearAll()">AC</button>
        <button class="special" onclick="clearEntry()">C</button>
        <button class="special" onclick="backspace()">⌫</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>
</div>

<script>

/* =========================
   CORE ELEMENTS
========================= */
const display = document.getElementById("display");
const history = document.getElementById("history");

/* =========================
   INPUT HANDLER
========================= */
function append(val) {
    display.value += val;
    autoResize();
}

/* =========================
   CLEAR FUNCTIONS
========================= */
function clearAll() {
    display.value = "";
    history.textContent = "";
}

function clearEntry() {
    display.value = "";
}

function backspace() {
    display.value = display.value.slice(0, -1);
}

/* =========================
   SAFE CALC ENGINE
========================= */
function calculate() {
    try {
        let exp = display.value;

        if (!exp) return;

        exp = exp.replace(/×/g, '*').replace(/÷/g, '/');

        // prevent invalid ending
        if (/[\+\-\*\/.]$/.test(exp)) {
            throw new Error("Invalid Expression");
        }

        const result = Function('"use strict"; return (' + exp + ')')();

        if (!isFinite(result)) {
            throw new Error("Math Error");
        }

        history.textContent = display.value;
        display.value = result;

    } catch (err) {
        display.value = "Error";
        setTimeout(() => display.value = "", 1200);
    }
}

/* =========================
   KEYBOARD SUPPORT
========================= */
document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
        append(e.key);
    } else if (e.key === "Enter") {
        calculate();
    } else if (e.key === "Backspace") {
        backspace();
    } else if (e.key === "Escape") {
        clearAll();
    }
});

/* =========================
   AUTO RESIZE TEXT
========================= */
function autoResize() {
    display.classList.toggle("long", display.value.length > 12);
}

</script>

</body>
</html>
